<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep Ally</title>
    <link rel="stylesheet" href="styles.css">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
   

</head>
<body>
    <header>
      <div class="">
        <a class="navbar-brand" href="#">
          <svg width="50" height="50">
            <circle cx="25" cy="25" r="20" fill="#fff" stroke="#28a745" stroke-width="2.5"/>
              <path d="M20 25 L 30 35 L 25 40 L 20 35 Z" fill="#28a745"/>
          </svg>
          <h1>Interview <span>Prep </span>Ally</h1>
        </a>
            </div>
          </header>
          <main class="center container-fluid mt-4 bg-dark">
            <div class="row justify-content-center">
              <div class="content-container col-8">
                <div class="cv-upload">
                  <h2>Upload Your CV</h2>
                  <input type="file" id="cv-input" accept=".doc,.docx,.pdf">
                  <p>Coming Soon! CV parsing for targeted questions.</p>
                </div>
                <div class="job-description">
                  <h2>Enter Job Description</h2>
                  <textarea id="job-description" rows="10" placeholder="Enter job description"></textarea>
                </div>
                <div class="d-flex">
                  <select id="experience-level" class="ml-3">
                    <option value="">Select Exp Level</option>
                    <option value="entry">Entry Level</option>
                    <option value="mid">Mid Level</option>
                    <option value="senior">Senior Level</option>
                  </select>
                  <button id="generate-questions">Generate Interview Questions (Sample Questions)</button>
                  <span class="ms-3"></span>
                </div>
              </div>
            </div>
        </main>
        <div>
          <input type="file" id="test-input" accept=".doc,.docx,.pdf">
          <button id="test-btn">Test</button>
        </div>
        <div id="results"></div>
          <script src=".script.js" type="module"></script>
          <script src="pdfText.js" type="module"></script>
      
</body>
</html>
