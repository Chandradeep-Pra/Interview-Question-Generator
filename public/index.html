<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep Ally</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/your-awesome-fontawesome-kit-code.js" crossorigin="anonymous"></script>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.6.347/pdf.min.js" integrity="sha512-Z8CqofpIcnJN80feS2uccz+pXWgZzeKxDsDNMD/dJ6997/LSRY+W4NmEt9acwR+Gt9OHN0kkI1CTianCwoqcjQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script> -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.7.1/gsap.min.js"></script>

</head>
</head>
<body>
  <header class="w-full py-5 sm:px-10 px-5  items-center bg-teal-900	 text-white">
    <nav class=" w-full screen-max-width flex justify-between" id="nav">
      <a class="flex" href="#">
        <svg width="50" height="50" id="logo">
          <circle cx="25" cy="25" r="20" fill="transparent" stroke="#28a745" stroke-width="3" id="circle"/>
            <path d="M20 25 L 30 35 L 25 40 L 20 35 Z" fill="#28a745"/>
        </svg>
        <div class = "flex flex-1 justify-center  ml-5 mt-1">
          <span id="title" class="text-3xl max-sm:text-lg cursor-pointer text-gray hover:text-white transition-all">Interview <span class="opacity-0" id="prep-span">Prep </span>Ally</span>
        </div>
      </a>
      
        <!-- <div class="bg-teal-200  rounded-full" style="width: 50px; height: 50px;">
          <i class="fa-solid fa-sun text-xl text-center px-4 py-3"></i>
        </div> -->
      </nav>
  </header>
  <main class="" id="main">
    <div class="">
      <div class="">
        <div class="cv-upload">
          <h2>Upload Your CV</h2>
          <!-- <input type="file" id="cv-input" accept=".doc,.docx,.pdf"> -->
          <label for="cv-input">Select a file</label>
          <input type="file" id="cv-input" accept=".doc,.docx,.pdf" hidden>
          <!--  <label for="com-input">Enter Company Name</label> -->
          <input type="text" id="com-input" class="" placeholder="Company applying for ?">
          <br>
          <span id="selected-file"></span>
          <br>
          <!-- <p>Coming Soon! CV parsing for targeted questions.</p> -->
        </div>
        <div class="job-description">
          <!-- <h2>Enter Job Description</h2> -->
          <textarea id="job-description" rows="10" placeholder="  Enter job description"></textarea>
        </div>
        <br>
        <div class="">
          <select id="experience-level" class="">
            <option value="">Select Exp Level</option>
            <option value="entry">Entry Level</option>
            <option value="mid">Mid Level</option>
            <option value="senior">Senior Level</option>
          </select>
          <button id="generate-questions">Generate Interview Questions (Sample Questions)</button>
            <span class=""></span>
        </div>
      </div>
    </div>
  </main>
  <div class="" id="results" placeholder="Extracted PDF result her ... " ></div>
  <script src="script.js" type="module"></script>
  <script src="pdfText.js" type="module"></script>
  <script src="anims.js" type="module"></script>
  <script src="generateQuestions.js" type="module"></script>
</body>
</html>
